<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./output.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=pause,skip_next,skip_previous" />
</head>
<body class="bg-[#e4e4e4] container">
    <h1 class="text-2xl my-4">Music player</h1>
    <img class="aspect-square w-100" src=""/>
    <div class="flex gap-8">
        <button>
            <span class="material-symbols-outlined text-4xl!">
                skip_previous
            </span>
        </button>

        <button class="w-15 bg-black aspect-square rounded-full text-white grid place-items-center">
            <span class="material-symbols-outlined text-4xl!">
                pause
            </span>
        </button>

        <button>
            <span class="material-symbols-outlined text-4xl!">
                skip_next
            </span>
        </button>

    </div>

    <script src="script.js"></script>
</body>

</html>
